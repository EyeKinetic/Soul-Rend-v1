<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://va.vercel-scripts.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://fra.cloud.appwrite.io https://vitals.vercel-insights.com https://va.vercel-scripts.com; img-src 'self' data: https: blob:; media-src 'self';">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulRend | The Ultimate Experience</title>
  <meta name="description" content="Experience SoulRend, the ultimate spirit particles game. Check announcements, patch notes, events, and community information. Join the SoulRend network today!">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Background Canvas for Spirit Particles (Reishi) -->
  <canvas id="bg-canvas"></canvas>

  <!-- Navigation Bar -->
  <nav class="navbar glass-panel">
    <div class="nav-left">
      <div class="logo">
        <span class="logo-text" style="font-family: 'Oswald', sans-serif; letter-spacing: 4px; font-size: 24px;">SoulRend</span>
        <div class="logo-glow"></div>
      </div>
    </div>
    <div class="nav-center">
      <button class="nav-link active" data-target="view-announcements">Announcements</button>
      <button class="nav-link" data-target="view-patch-notes">Patch Notes</button>
      <button class="nav-link" data-target="view-events">Events</button>
      <button class="nav-link" data-target="view-information">Information</button>
    </div>
    <div class="nav-right" style="display: flex; gap: 16px; align-items: center;">
      <div class="mobile-nav" style="position: relative;">
        <button class="nav-link" id="mobile-menu-btn" aria-haspopup="true"
          style="margin: 0; display: flex; align-items: center; gap: 4px; padding: 0;">Menu <span
            style="font-size: 10px;">▼</span></button>
        <div class="contact-dropdown" id="mobile-dropdown" style="top: 50px; right: 0; bottom: auto; padding: 8px 0;">
          <a href="#" class="dropdown-item mobile-nav-link active" data-target="view-announcements">Announcements</a>
          <a href="#" class="dropdown-item mobile-nav-link" data-target="view-patch-notes">Patch Notes</a>
          <a href="#" class="dropdown-item mobile-nav-link" data-target="view-events">Events</a>
          <a href="#" class="dropdown-item mobile-nav-link" data-target="view-information">Information</a>
        </div>
      </div>
      <button class="btn-secondary" id="music-toggle-btn"
        style="padding: 6px 12px; font-size: 14px; background: rgba(255,255,255,0.05);">
        🔊 Music
      </button>
      <!-- Developer access is now hidden in the top-left logo -->
    </div>
  </nav>

  <!-- Background Audio Player -->
  <audio id="bg-audio" preload="auto">
    <source src="/bg_new.webm" type="audio/webm">
  </audio>

  <!-- Main Content Area -->
  <main id="app-container">

    <!-- === EVENTS === -->
    <section id="view-events" class="view-section">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="events-feed-container">
          <div class="section-header">
            <h2>Events</h2>
          </div>
          <!-- Dynamic Event Posts Go Here -->
        </div>
      </div>
    </section>

    <!-- === PATCH NOTES === -->
    <section id="view-patch-notes" class="view-section">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="patch-notes-feed-container">
          <div class="section-header">
            <h2>Patch Notes</h2>
          </div>
          <!-- Dynamic Patch Notes Go Here -->
        </div>
      </div>
    </section>

    <!-- === ANNOUNCEMENTS === -->
    <section id="view-announcements" class="view-section active">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="announcements-feed-container">
          <div class="section-header">
            <h2>Announcements</h2>
          </div>
          <!-- Dynamic Announcements Go Here -->
        </div>
      </div>
    </section>

    <!-- === INFORMATION (TRELLO STYLE BOARD) === -->
    <section id="view-information" class="view-section">
      <div class="section-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <h2>Information Board</h2>

        <input type="text" id="info-search" class="input-dark" style="max-width: 100%; width: 300px;"
          placeholder="Search by title...">
      </div>

      <!-- Trello-like Horizontal Scrolling Board Layout -->
      <div class="board-layout" id="information-board-container">
        <!-- Columns will be injected dynamically via JS -->
      </div>
    </section>



  </main>



  <!-- Post Viewer Modal -->
  <div id="post-viewer-modal" class="modal-overlay">
    <div class="modal-content glass-panel"
      style="max-width: 600px; padding: 0; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column;">
      <img id="viewer-img" src="" alt="Post Header"
        style="width: 100%; height: 200px; object-fit: cover; display: none;" onerror="this.style.display='none'">
      <div style="padding: 32px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
          <div>
            <span id="viewer-badge" class="badge">BADGE</span>
            <span id="viewer-date" class="mono" style="margin-left: 12px; color: var(--text-secondary);">Date</span>
          </div>
          <button id="viewer-close"
            style="background: transparent; border: none; color: white; cursor: pointer; font-size: 24px; padding: 4px;">&times;</button>
        </div>
        <h2 id="viewer-title" style="margin-bottom: 24px; font-size: 24px;">Post Title</h2>
        <div id="viewer-body"
          style="color: var(--text-secondary); line-height: 1.6; font-size: 15px; white-space: pre-wrap;">
          Post body goes here...
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Post Published!</div>
  <!-- App Footer (GitHub Style) -->
  <footer class="app-footer glass-panel">
    <div class="footer-content">
      <div class="footer-left">
        <span class="footer-icon" style="font-size: 20px; line-height: 1;">🌸</span>
        <span>© 2026 SoulRend</span>
      </div>
      <div class="footer-links" style="position: relative; display: flex; gap: 16px;">
        <!-- Community Dropdown -->
        <div style="position: relative;">
          <button class="footer-link-btn" id="community-btn" aria-haspopup="true">Community</button>
          <div class="contact-dropdown" id="community-dropdown">
            <a href="https://discord.gg/Ncf8UBk8k5" target="_blank" class="dropdown-item">Discord</a>
            <a href="https://www.youtube.com/@kar89gamernice47" target="_blank" class="dropdown-item">YouTube</a>
          </div>
        </div>

        <!-- Contact Team Dropdown -->
        <div style="position: relative;">
          <button class="footer-link-btn" id="contact-team-btn" aria-haspopup="true">Contact Team</button>
          <div class="contact-dropdown" id="contact-dropdown">
            <a href="https://discordapp.com/users/605745578646700043" target="_blank" class="dropdown-item">Lead Dev of
              Web</a>
            <a href="https://discord.gg/5PTJcPUxCj" target="_blank" class="dropdown-item">Staff Team</a>
          </div>
        </div>
      </div>
    </div>
  </footer>


  <script type="module" src="/main.js"></script>

  <div id="loading-screen">
    <canvas id="loading-canvas"></canvas>
    <div class="loading-content">
      <div class="loading-icon">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="38" stroke="#0dd7f2" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
          <circle cx="50" cy="50" r="28" stroke="#0dd7f2" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>
          <circle cx="50" cy="50" r="18" stroke="#0dd7f2" stroke-width="1.5" opacity="0.6"/>
          <line x1="50" y1="12" x2="50" y2="22" stroke="#0dd7f2" stroke-width="1.5"/>
          <line x1="50" y1="78" x2="50" y2="88" stroke="#0dd7f2" stroke-width="1.5"/>
          <line x1="12" y1="50" x2="22" y2="50" stroke="#0dd7f2" stroke-width="1.5"/>
          <line x1="78" y1="50" x2="88" y2="50" stroke="#0dd7f2" stroke-width="1.5"/>
          <line x1="23" y1="23" x2="30" y2="30" stroke="#0dd7f2" stroke-width="1"/>
          <line x1="77" y1="23" x2="70" y2="30" stroke="#0dd7f2" stroke-width="1"/>
          <line x1="23" y1="77" x2="30" y2="70" stroke="#0dd7f2" stroke-width="1"/>
          <line x1="77" y1="77" x2="70" y2="70" stroke="#0dd7f2" stroke-width="1"/>
          <text x="50" y="56" text-anchor="middle" fill="#0dd7f2" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold">SR</text>
        </svg>
      </div>
      <h1 class="loading-title">SoulRend</h1>
      <div class="loading-line"></div>
      <button id="loading-enter-btn" class="loading-btn">INITIALIZE SYSTEM</button>
    </div>
  </div>
</body>

</html>
