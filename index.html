<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Rend Command Hub</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Background Particles -->
  <div id="particles-bg"></div>

  <!-- Navigation Bar -->
  <nav class="navbar glass-panel">
    <div class="nav-left">
      <div class="logo" id="open-dev-auth" style="cursor: pointer;">
        <span class="logo-text" style="font-family: 'Oswald', sans-serif; letter-spacing: 4px; font-size: 24px;">SOUL
          REND</span>
        <div class="logo-glow"></div>
      </div>
    </div>
    <div class="nav-center">
      <button class="nav-link active" data-target="view-events">Events</button>
      <button class="nav-link" data-target="view-patch-notes">Patch Notes</button>
      <button class="nav-link" data-target="view-announcements">Announcements</button>
      <button class="nav-link" data-target="view-information">Information</button>
    </div>
    <div class="nav-right" style="display: flex; gap: 16px; align-items: center;">
      <button class="btn-secondary" id="music-toggle-btn"
        style="padding: 6px 12px; font-size: 14px; background: rgba(255,255,255,0.05);">
        🔊 Music
      </button>
      <!-- Developer access is now hidden in the top-left logo -->
    </div>
  </nav>

  <!-- Background Audio Player -->
  <audio id="bg-audio" preload="auto">
    <source src="/bg1.mp3" type="audio/mpeg">
  </audio>

  <!-- Main Content Area -->
  <main id="app-container">

    <!-- === EVENTS === -->
    <section id="view-events" class="view-section active">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="events-feed-container">
          <div class="section-header">
            <h2>Events</h2>
          </div>
          <!-- Dynamic Event Posts Go Here -->
        </div>
      </div>
    </section>

    <!-- === PATCH NOTES === -->
    <section id="view-patch-notes" class="view-section">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="patch-notes-feed-container">
          <div class="section-header">
            <h2>Patch Notes</h2>
          </div>
          <!-- Dynamic Patch Notes Go Here -->
        </div>
      </div>
    </section>

    <!-- === ANNOUNCEMENTS === -->
    <section id="view-announcements" class="view-section">
      <div class="dashboard-grid" style="grid-template-columns: 1fr; max-width: 900px;">
        <div class="main-feed" id="announcements-feed-container">
          <div class="section-header">
            <h2>Announcements</h2>
          </div>
          <!-- Dynamic Announcements Go Here -->
        </div>
      </div>
    </section>

    <!-- === INFORMATION (TRELLO STYLE BOARD) === -->
    <section id="view-information" class="view-section">
      <div class="section-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <h2>Information Board</h2>
        <input type="text" id="info-search" class="input-dark" style="max-width: 100%; width: 300px;"
          placeholder="Search by title..." oninput="filterWiki(this.value)">
      </div>

      <!-- Trello-like Horizontal Scrolling Board Layout -->
      <div class="board-layout" id="information-board-container">
        <!-- Columns will be injected dynamically via JS -->
      </div>
    </section>

    <!-- === SECURE DEV PORTAL (CMS) === -->
    <!-- Hidden by default via CSS until authenticated -->
    <section id="view-dev-portal" class="view-section" style="display: none;">
      <div class="portal-layout">
        <aside class="admin-sidebar glass-panel">
          <div class="sidebar-header">CMS TOOLS</div>
          <ul class="sidebar-menu">
            <li class="active">Post Update</li>
            <button class="btn-secondary" id="logout-dev-btn" style="margin-top: 40px; width: 100%;">Log Out
              Admin</button>
          </ul>
        </aside>

        <div class="portal-content">
          <header class="content-header">
            <h2>Developer CMS</h2>
            <div class="header-actions">
              <button class="btn-secondary" id="cancel-edit-btn" style="display: none; margin-right: 12px;">Cancel
                Edit</button>
              <button class="btn-primary pulse" id="publish-btn">Publish to Live Network</button>
            </div>
          </header>

          <div class="editor-area">
            <div class="form-group">
              <label>Post Title</label>
              <input type="text" id="cms-title" class="input-dark" placeholder="Enter title here...">
            </div>
            <div style="display: flex; gap: 16px;">
              <div class="form-group" style="flex: 1;">
                <label>Target Page</label>
                <select id="cms-category" class="input-dark">
                  <option value="announcements">Announcements</option>
                  <option value="patch-notes">Patch Notes</option>
                  <option value="events">Events</option>
                  <option value="information">Information</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1; display: none;" id="cms-time-group">
                <label>Event End Time</label>
                <input type="datetime-local" id="cms-time" class="input-dark">
              </div>
              <div class="form-group" style="flex: 1; display: none;" id="cms-board-column-group">
                <label>Board Column (Info Only)</label>
                <input type="text" id="cms-board-column" class="input-dark" placeholder="e.g. Shinigami, General">
              </div>
            </div>
            <div style="display: flex; gap: 16px;">
              <div class="form-group" style="flex: 2;">
                <label>Custom Tag / Badge</label>
                <input type="text" id="cms-badge" class="input-dark" placeholder="e.g. URGENT, THREAT INTEL">
              </div>
              <div class="form-group" style="flex: 1;">
                <label>Tag Color</label>
                <select id="cms-badge-color" class="input-dark">
                  <option value="dev">Red (Urgent/Dev)</option>
                  <option value="news">Blue (News)</option>
                  <option value="event">Orange (Event)</option>
                  <option value="lore">Cyan (Lore)</option>
                </select>
              </div>
              <div class="form-group" style="flex: 3;">
                <label>Featured Image (URL or Upload)</label>
                <div style="display: flex; gap: 8px;">
                  <input type="text" id="cms-img" class="input-dark" placeholder="https://..." style="flex: 1;">
                  <button type="button" class="btn-secondary" onclick="document.getElementById('cms-img-file').click()"
                    style="padding: 10px; font-size: 14px; white-space: nowrap;">Upload File</button>
                  <input type="file" id="cms-img-file" accept="image/*" multiple style="display: none;">
                </div>
              </div>
            </div>

            <div class="rich-text-editor glass-panel">
              <div class="editor-toolbar">
                <span class="toolbar-btn" data-tag="**">B</span>
                <span class="toolbar-btn" data-tag="*">I</span>
                <span class="toolbar-btn" data-tag="[Link](url)">Link</span>
              </div>
              <textarea id="cms-body" class="editor-body input-dark"
                placeholder="Write plain text or markdown content here..."></textarea>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Dev Auth Modal -->
  <div id="auth-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <h3 style="margin-bottom: 8px;">Developer Access</h3>
      <input type="email" id="dev-email" class="input-dark" placeholder="Enter email address..."
        style="margin-bottom: 12px; margin-top: 24px;">
      <input type="password" id="dev-password" class="input-dark" placeholder="Enter password..."
        style="margin-bottom: 16px;">
      <p id="auth-error" class="text-secondary"
        style="color: var(--warning); display: none; margin-bottom: 16px; font-size: 14px;">Invalid credentials.</p>

      <div style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn-secondary" id="auth-cancel">Cancel</button>
        <button class="btn-primary" id="auth-submit">Authenticate</button>
      </div>
    </div>
  </div>

  <!-- Post Viewer Modal -->
  <div id="post-viewer-modal" class="modal-overlay">
    <div class="modal-content glass-panel"
      style="max-width: 600px; padding: 0; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column;">
      <img id="viewer-img" src="" alt="Post Header"
        style="width: 100%; height: 200px; object-fit: cover; display: none;" onerror="this.style.display='none'">
      <div style="padding: 32px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
          <div>
            <span id="viewer-badge" class="badge">BADGE</span>
            <span id="viewer-date" class="mono" style="margin-left: 12px; color: var(--text-secondary);">Date</span>
          </div>
          <button id="viewer-close"
            style="background: transparent; border: none; color: white; cursor: pointer; font-size: 24px; padding: 4px;">&times;</button>
        </div>
        <h2 id="viewer-title" style="margin-bottom: 24px; font-size: 24px;">Post Title</h2>
        <div id="viewer-body"
          style="color: var(--text-secondary); line-height: 1.6; font-size: 15px; white-space: pre-wrap;">
          Post body goes here...
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification for Publishing -->
  <!-- App Footer (GitHub Style) -->
  <footer class="app-footer glass-panel">
    <div class="footer-content">
      <div class="footer-left">
        <span class="footer-icon" style="font-size: 20px; line-height: 1;">🌸</span>
        <span>© 2026 Soulrend Command Hub</span>
      </div>
      <div class="footer-links" style="position: relative; display: flex; gap: 16px;">
        <!-- Community Dropdown -->
        <div style="position: relative;">
          <button class="footer-link-btn" id="community-btn" aria-haspopup="true">Community</button>
          <div class="contact-dropdown" id="community-dropdown">
            <a href="https://discord.gg/Ncf8UBk8k5" target="_blank" class="dropdown-item">Discord</a>
            <a href="https://www.youtube.com/@kar89gamernice47" target="_blank" class="dropdown-item">YouTube</a>
          </div>
        </div>

        <!-- Contact Team Dropdown -->
        <div style="position: relative;">
          <button class="footer-link-btn" id="contact-team-btn" aria-haspopup="true">Contact Team</button>
          <div class="contact-dropdown" id="contact-dropdown">
            <a href="https://discordapp.com/users/605745578646700043" target="_blank" class="dropdown-item">Lead Dev of
              Web</a>
            <a href="https://discord.gg/5PTJcPUxCj" target="_blank" class="dropdown-item">Staff Team</a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="/main.js"></script>
</body>

</html>
